name: Sync Notion to Blog

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight (UTC)
  workflow_dispatch: # Can be triggered manually

permissions:
  contents: write

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Notion Script Repo
        uses: actions/checkout@v4

      - name: Checkout Astro Blog Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.BLOG_REPO }}
          path: blog-repo
          token: ${{ secrets.GITTOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Sync Script
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_BLOG_DB_ID: ${{ vars.NOTION_BLOG_DB_ID }}
          NOTION_PROJECTS_DB_ID: ${{ vars.NOTION_PROJECTS_DB_ID }}
          # Configure paths so sync results go into the checked-out blog-repo folder
          BLOG_DIR: ./blog-repo/src/content/blog
          PROJECTS_DIR: ./blog-repo/src/content/project
          IMAGE_DIR: ./blog-repo/src/assets/notion
        run: npm run sync

      - name: Commit and Push to Astro Repo
        run: |
          cd blog-repo
          git config user.name '${{ vars.GIT_USER_NAME }}'
          git config user.email '${{ vars.GIT_USER_EMAIL }}'
          
          git add .
          CHANGES=$(git status --porcelain)
          if [ -n "$CHANGES" ]; then
            echo "Changes detected, committing and pushing to blog repository"
            git commit -m "chore(content): sync latest posts from Notion"
            git push
          else
            echo "No changes to commit"
          fi
